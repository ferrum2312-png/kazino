# Production stack: Postgres + Redis + FastAPI (internal) + Caddy (public, auto-HTTPS).
# Usage:  cp .env.prod.example .env  &&  edit .env  &&  docker compose -f docker-compose.prod.yml up -d --build
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kazino
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: kazino
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kazino"]
      interval: 5s
      timeout: 3s
      retries: 10
    # No published port: reachable only inside the compose network.

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://kazino:${POSTGRES_PASSWORD}@db:5432/kazino
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      BOT_TOKEN: ${BOT_TOKEN}
      TON_API_KEY: ${TON_API_KEY:-}
      STAR_USD_PRICE: ${STAR_USD_PRICE:-0.015}
      CRYPTO_PAY_TOKEN: ${CRYPTO_PAY_TOKEN:-}
      CRYPTO_PAY_BASE: ${CRYPTO_PAY_BASE:-https://pay.crypt.bot}
      PUBLIC_BASE_URL: https://${SITE_ADDRESS}
      ENVIRONMENT: production
      CORS_ORIGINS: https://${SITE_ADDRESS}
    expose:
      - "8000"
    # Runs the image's default CMD (uvicorn, no --reload).

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
